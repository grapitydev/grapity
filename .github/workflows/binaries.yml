name: Build Standalone Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g. v0.8.2)'
        required: true
        type: string
  repository_dispatch:
    types: [build-binaries]

permissions:
  contents: read

env:
  TAG: ${{ inputs.tag || github.event.client_payload.tag }}

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Setup
        run: mise run setup

      - name: Build package (dist/)
        run: mise run build

      - name: Build standalone binaries
        run: bun run build:standalone

      - name: Smoke test darwin-arm64
        run: bash scripts/smoke-standalone.sh dist-standalone/grapity-darwin-arm64 "$(jq -r .version package.json)"

      - uses: actions/upload-artifact@v4
        with:
          name: standalone-binaries
          path: dist-standalone/grapity-*
          retention-days: 1

  smoke-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/download-artifact@v4
        with:
          name: standalone-binaries

      - name: Make binaries executable
        run: chmod +x grapity-*

      - name: Smoke test linux-x64
        run: bash scripts/smoke-standalone.sh grapity-linux-x64 "$(jq -r .version package.json)"

  publish-binaries:
    needs: [build, smoke-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: standalone-binaries

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" grapity-darwin-arm64 grapity-darwin-x64 grapity-linux-x64 grapity-linux-arm64 --clobber --repo "${{ github.repository }}"

  update-homebrew:
    needs: publish-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: standalone-binaries

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: grapitydev/homebrew-tap
          token: ${{ secrets.PACKAGES_REPO_PAT }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${TAG#v}"
          cd homebrew-tap
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/grapity.rb
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            sha=$(sha256sum "../grapity-${target}" | cut -d' ' -f1)
            perl -0pi -e "s/(grapity-${target}\"\n\s+sha256 \")[^\"]*/\${1}${sha}/" Formula/grapity.rb
          done

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/grapity.rb
          git commit -m "Update grapity to v${TAG#v}" || echo "No changes to commit"
          git push

  packages:
    needs: publish-binaries
    runs-on: ubuntu-latest
    env:
      NFPM_VERSION: 2.47.0
      NFPM_SHA256: 0660ca602b2d2d2ae4781a06c692b3eeb9d437ffea05b831d76e41f4a3188783
      ARCHLINUX_IMAGE: archlinux:latest@sha256:592e11bd99ab579f933a0cb77a8f66e2f3ae57f5eafacf13aea44a6e98ef21ae
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: standalone-binaries

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro createrepo-c
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" -o /tmp/nfpm.tar.gz
          echo "${NFPM_SHA256}  /tmp/nfpm.tar.gz" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f /tmp/nfpm.tar.gz nfpm
          rm /tmp/nfpm.tar.gz

      - name: Import GPG release key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-preset-passphrase" > ~/.gnupg/gpg-agent.conf
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$GPG_PRIVATE_KEY" > release-key.asc
          chmod 600 release-key.asc
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          echo "KEYID=$KEYID" >> "$GITHUB_ENV"
          gpgconf --kill all || true
          for keygrip in $(gpg --list-secret-keys --with-keygrip --with-colons | awk -F: '/^grp/{print $10}'); do
            printf '%s\n' "$GPG_PASSPHRASE" | /usr/lib/gnupg/gpg-preset-passphrase --preset "$keygrip"
          done
          gpg --batch --yes --passphrase-fd 3 --local-user "$KEYID" --output /dev/null --sign /dev/null 3<<<"$GPG_PASSPHRASE"

      - name: Build deb/rpm/pkg packages
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${TAG#v}"
          mkdir -p out
          for combo in "amd64:x64" "arm64:arm64"; do
            GOARCH="${combo%%:*}"
            TARGET="${combo##*:}"
            for packager in deb rpm archlinux; do
              ARCH="$GOARCH" VERSION="$VERSION" TARGET="$TARGET" NFPM_PASSPHRASE="$GPG_PASSPHRASE" \
                nfpm package --config nfpm.yaml --packager "$packager" --target out/
            done
          done
          ls -la out/

      - name: Assemble apt repository
        run: |
          VERSION="${TAG#v}"
          mkdir -p site/apt/conf
          cat > site/apt/conf/distributions <<EOF
          Origin: Grapity
          Label: grapity
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: grapity CLI apt repository
          SignWith: ${KEYID}
          EOF
          reprepro -b site/apt includedeb stable "out/grapity_${VERSION}_amd64.deb" "out/grapity_${VERSION}_arm64.deb"

      - name: Assemble dnf repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${TAG#v}"
          mkdir -p site/dnf/x86_64 site/dnf/aarch64
          cp "out/grapity-${VERSION}-1.x86_64.rpm" site/dnf/x86_64/
          cp "out/grapity-${VERSION}-1.aarch64.rpm" site/dnf/aarch64/
          createrepo_c site/dnf/x86_64
          createrepo_c site/dnf/aarch64
          for arch in x86_64 aarch64; do
            gpg --batch --yes --passphrase-fd 3 --local-user "$KEYID" \
              --detach-sign --armor "site/dnf/${arch}/repodata/repomd.xml" 3<<<"$GPG_PASSPHRASE"
          done
          cat > site/dnf/grapity.repo <<EOF
          [grapity]
          name=grapity
          baseurl=https://packages.grapity.dev/dnf/\$basearch
          enabled=1
          gpgcheck=1
          gpgkey=https://packages.grapity.dev/gpg.key
          EOF

      - name: Assemble pacman repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${TAG#v}"
          mkdir -p site/pacman/x86_64 site/pacman/aarch64
          cp "out/grapity-${VERSION}-1-x86_64.pkg.tar.zst" site/pacman/x86_64/
          cp "out/grapity-${VERSION}-1-aarch64.pkg.tar.zst" site/pacman/aarch64/
          for arch in x86_64 aarch64; do
            gpg --batch --yes --passphrase-fd 3 --local-user "$KEYID" \
              --detach-sign "site/pacman/${arch}/grapity-${VERSION}-1-${arch}.pkg.tar.zst" 3<<<"$GPG_PASSPHRASE"
          done
          docker run --rm \
            -v "$PWD/site/pacman:/work" \
            -v "$HOME/.gnupg:/root/.gnupg" \
            -e GPG_PASSPHRASE -e KEYID \
            "$ARCHLINUX_IMAGE" bash -c '
              set -e
              chmod 700 /root/.gnupg
              echo "allow-preset-passphrase" > /root/.gnupg/gpg-agent.conf
              gpgconf --kill all || true
              for keygrip in $(gpg --list-secret-keys --with-keygrip --with-colons | awk -F: "/^grp/{print \$10}"); do
                printf "%s\n" "$GPG_PASSPHRASE" | /usr/lib/gnupg/gpg-preset-passphrase --preset "$keygrip"
              done
              gpg --batch --yes --passphrase-fd 3 --local-user "$KEYID" --output /dev/null --sign /dev/null 3<<<"$GPG_PASSPHRASE"
              for arch in x86_64 aarch64; do
                cd "/work/$arch"
                repo-add --include-sigs --sign --key "$KEYID" grapity.db.tar.gz ./*.pkg.tar.zst
              done
            '

      - name: Publish site to gh-pages
        env:
          PACKAGES_REPO_PAT: ${{ secrets.PACKAGES_REPO_PAT }}
        run: |
          gpg --armor --export "$KEYID" > site/gpg.key
          echo "packages.grapity.dev" > site/CNAME
          cat > site/index.html <<'EOF'
          <!doctype html>
          <title>grapity packages</title>
          <p>apt/dnf/pacman repositories for the grapity CLI.
          See <a href="https://github.com/grapitydev/packages">github.com/grapitydev/packages</a> for install instructions.</p>
          EOF
          cd site
          git init -q -b gh-pages .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish packages for v${TAG#v}"
          AUTH_HEADER=$(printf 'x-access-token:%s' "$PACKAGES_REPO_PAT" | base64 -w0)
          git -c http.extraheader="Authorization: Basic $AUTH_HEADER" \
            push --force https://github.com/grapitydev/packages.git gh-pages

      - name: Clean up key material
        if: always()
        run: |
          shred -u release-key.asc 2>/dev/null || rm -f release-key.asc
          rm -rf ~/.gnupg
