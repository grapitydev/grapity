name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Setup
        run: mise run setup

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: mise run build

      - name: Check package size
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          BYTES=$(jq '.[0].size' /tmp/pack.json)
          FILES=$(jq '.[0].entryCount' /tmp/pack.json)
          echo "Tarball: $BYTES bytes across $FILES files"
          if [ "$BYTES" -gt 3145728 ]; then
            echo "Package tarball exceeds 3 MB"
            exit 1
          fi
