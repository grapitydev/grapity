          "gateway-configs"
        ],
        "summary": "Push a gateway configuration version",
        "description": "Push a new gateway configuration version. On the first push for a given name, the config is created. On subsequent pushes, a new version is added and old versions are retained (up to 5).\n",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/PushGatewayConfigRequest"
              },
              "example": {
                "name": "payments-api-gateway",
                "provider": "kong",
                "specName": "payments-api",
                "specSemver": "1.2.0",
                "routes": [
                  {
                    "path": "/payments",
                    "methods": [
                      "GET",
                      "POST"
                    ]
                  },
                  {
                    "path": "/payments/{id}",
                    "methods": [
                      "GET",
                      "PUT",
                      "DELETE"
                    ]
                  }
                ],
                "environments": {
                  "staging": {
                    "kongAddr": "http://kong-staging:8001",
                    "upstream": "http://payments-staging:8080",
                    "plugins": [
                      {
                        "name": "rate-limiting",
                        "config": {
                          "minute": 1000
                        },
                        "order": 1
                      },
