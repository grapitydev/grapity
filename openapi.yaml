      "name": "Apache 2.0",
      "url": "https://www.apache.org/licenses/LICENSE-2.0"
    }
  },
  "servers": [
    {
      "url": "http://localhost:3750",
      "description": "Local development server"
    }
  ],
  "security": [
    {
      "keycloak": []
    }
  ],
  "tags": [
    {
      "name": "health",
      "description": "Server health"
    },
    {
      "name": "specs",
      "description": "Spec management \u2014 push, list, retrieve, validate, versions, delete, and compatibility"
    },
    {
      "name": "gateway-configs",
      "description": "Gateway configuration management"
    },
    {
      "name": "gateway-logs",
      "description": "Gateway access log ingestion and querying"
    }
