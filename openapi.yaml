          "specs"
        ],
        "summary": "Push a spec version",
        "description": "Push a new spec version to the registry. On the first push for a given name, the spec is created. On subsequent pushes, the spec is diffed against the previous version. Breaking changes are blocked unless `force: true` is provided with a reason.\n",
