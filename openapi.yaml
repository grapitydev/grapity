    "title": "Grapity Registry API",
    "version": "0.2.0",
    "description": "The Grapity Registry is an API contract guardian. It validates, versions, and enforces backward compatibility for OpenAPI and AsyncAPI specs. It also manages gateway configurations and ingests gateway access logs. Every spec that enters the registry has earned its place.\n",
